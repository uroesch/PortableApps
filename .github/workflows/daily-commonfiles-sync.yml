name: daily-commonfiles-sync

on:
  push:
    branches:
    - workflow/*
  #schedule:
  #  - cron: '20 2 * * *' # Sync submodules daily
  workflow_dispatch:

jobs:
  daily-commonfiles-sync:
    timeout-minutes: 90
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
        - ubuntu-latest

    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        ref: master
        submodules: recursive

#    - name: Setup git
#      shell: bash
#      run: |2+
#        set -x
#        git config --global user.name "Urs Roesch"
#        git config --global user.email "github@bun.ch"
#        git config --global pull.rebase true

     - name: Show remote
        git config --get-regex 'remote\..*'

    - name: Update common files
      shell: bash
      run: bash ./scripts/sync-common-files.sh --docker
